<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alberto AI Reboot</title>
    <style>
        :root {
            --amarelo: #FFD700;
            --azul-escuro: #0B192C;
            --azul-marinho-pastel: #1E3E62;
            --preto: #000000;
            --cinza-chat: #2A2F35;
            --texto-claro: #F5F5F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--preto);
            color: var(--texto-claro);
            overflow: hidden;
        }

        /* --- TELA DE BOAS-VINDAS --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--preto);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            animation: fadeIn 1.2s forwards ease-in-out;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .welcome-title {
            color: var(--amarelo);
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--amarelo);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 15px rgba(30, 62, 98, 0.5);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-iniciar {
            background-color: var(--amarelo);
            color: var(--preto);
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-iniciar:active {
            transform: scale(0.95);
            background-color: #e6c200;
        }

        /* --- TELA PRINCIPAL DO CHAT --- */
        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background-color: var(--azul-escuro);
        }

        /* Header */
        header {
            background-color: var(--azul-marinho-pastel);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .site-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--amarelo);
        }

        .chat-title-input {
            background: transparent;
            border: none;
            color: #A0AAB2;
            font-size: 0.85rem;
            margin-top: 2px;
            outline: none;
            border-bottom: 1px dashed transparent;
        }

        .chat-title-input:focus {
            border-bottom-color: var(--amarelo);
            color: var(--texto-claro);
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--amarelo);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        /* Área de Mensagens */
        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ia {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bubble.user {
            background-color: var(--azul-marinho-pastel);
            color: var(--texto-claro);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .bubble.ia {
            background-color: var(--cinza-chat);
            color: var(--texto-claro);
            border-bottom-left-radius: 4px;
        }

        /* --- IMPLEMENTAÇÃO DE IMAGEM DENTRO DO BALÃO DO ALBERTO --- */
        .alberto-image-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .alberto-image-box img {
            width: 100%;
            max-width: 260px;
            border-radius: 10px;
            border: 2px solid var(--amarelo);
            display: block;
        }

        .prompt-toggle-btn {
            background: rgba(255, 215, 0, 0.15);
            color: var(--amarelo);
            border: 1px solid var(--amarelo);
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            align-self: flex-start;
            font-weight: bold;
        }

        .prompt-text-display {
            font-size: 0.8rem;
            color: #A0AAB2;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 6px;
            display: none;
            font-style: italic;
        }

        /* Animação de Digitação (...) */
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #A0AAB2;
            border-radius: 50%;
            animation: dotJump 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotJump {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Input / Rodapé estilo Twitter Mobile */
        .chat-input-container {
            background-color: var(--preto);
            display: flex;
            flex-direction: column;
            position: relative;
            border-top: 1px solid rgba(30, 62, 98, 0.4);
        }

        /* Badge Indicativo do Modo Imagem Ativo */
        #image-mode-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background-color: #e11d48;
            color: white;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border-top-right-radius: 8px;
            align-self: flex-start;
            margin-left: 12px;
            margin-top: 6px;
        }

        #image-mode-badge span {
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            padding: 0 5px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .chat-input-area {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 10;
        }

        .chat-input-area textarea {
            flex: 1;
            background-color: var(--azul-escuro);
            border: 1px solid var(--azul-marinho-pastel);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--texto-claro);
            resize: none;
            height: 40px;
            max-height: 100px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input-area textarea::placeholder {
            color: #657786;
        }

        /* Botão de + para abrir a HUD */
        .plus-hud-btn {
            background-color: var(--azul-marinho-pastel);
            color: var(--amarelo);
            border: 1px solid rgba(255, 215, 0, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn {
            background-color: var(--amarelo);
            color: var(--preto);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:active, .plus-hud-btn:active {
            transform: scale(0.9);
        }

        /* --- CONTEXTO HUD DE ADICIONAIS COM ANIMAÇÃO SLIDE --- */
        #hud-options-menu {
            position: absolute;
            bottom: 0px;
            left: 12px;
            background-color: var(--cinza-chat);
            border: 1px solid var(--azul-marinho-pastel);
            border-radius: 12px;
            padding: 8px;
            width: 130px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
        }

        /* Classe disparada via JS para deslizar e subir */
        #hud-options-menu.slide-up {
            transform: translateY(-60px);
            opacity: 1;
            pointer-events: auto;
        }

        .hud-action-item {
            background: transparent;
            border: none;
            color: var(--texto-claro);
            text-align: left;
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .hud-action-item:active {
            background-color: var(--azul-marinho-pastel);
            color: var(--amarelo);
        }

        /* --- MENU LATERAL (HISTÓRICO) --- */
        #sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background-color: var(--azul-marinho-pastel);
            z-index: 15;
            transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #sidebar.open {
            right: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--amarelo);
            font-weight: bold;
        }

        .close-sidebar {
            background: transparent;
            border: none;
            color: var(--texto-claro);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .btn-new-chat {
            background-color: transparent;
            color: var(--amarelo);
            border: 1px solid var(--amarelo);
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background-color: var(--azul-escuro);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .history-item:hover, .history-item.active {
            border-color: var(--amarelo);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Tela de Boas-Vindas -->
    <div id="welcome-screen">
        <div class="welcome-title">Alberto Reboot</div>
        <div class="avatar-circle">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpPfdVT7tCio3nmQ_svFK5XVq5G5AlDmPjAVCQ_U4KKEZitIAXDGdkkFU&s=10" alt="Alberto Avatar">
        </div>
        <button class="btn-iniciar" id="btn-iniciar">Iniciar</button>
    </div>

    <!-- Container Principal da Aplicação -->
    <div id="app-container">
        <header>
            <div class="header-info">
                <span class="site-title">Alberto AI Reboot</span>
                <input type="text" id="chat-title" class="chat-title-input" value="Nova conversa">
            </div>
            <button class="menu-btn" id="open-menu">☰</button>
        </header>

        <!-- Área onde as bolhas de chat vão aparecer -->
        <div id="chat-messages"></div>

        <!-- Rodapé Estruturado para conter a HUD e os Badges -->
        <div class="chat-input-container">
            
            <!-- Badge Indicativo de Modo Ativo -->
            <div id="image-mode-badge">Imagem <span onclick="desativarModoImagem()">X</span></div>
            
            <!-- HUD Menuzinho Deslizante -->
            <div id="hud-options-menu">
                <button class="hud-action-item" onclick="ativarModoImagem()">🖼️ Imagem</button>
            </div>

            <!-- Barra de Input (Mobile Estilo Twitter) -->
            <div class="chat-input-area">
                <button class="plus-hud-btn" id="open-hud-btn">+</button>
                <textarea id="user-input" placeholder="O que está acontecendo?"></textarea>
                <button class="send-btn" id="btn-enviar">➔</button>
            </div>
        </div>
    </div>

    <!-- Menu Lateral / Histórico -->
    <div id="overlay"></div>
    <div id="sidebar">
        <div class="sidebar-header">
            <span>Histórico</span>
            <button class="close-sidebar" id="close-menu">✕</button>
        </div>
        <button class="btn-new-chat" id="btn-new-chat">+ Novo Chat</button>
        <div class="history-list" id="history-list">
            <!-- Itens do histórico entram aqui via JS -->
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÕES DA CONFIGURAÇÃO DA IA (GROQ)
        // ==========================================
        const GROQ_API_KEY = "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"; // <-- RECOLOQUE SUA CHAVE DA API DO GROQ AQUI
        
        const COMPORTAMENTO_IA = `
            Você é o Alberto, você NAO foi feito para ser util.

 pelo contrário, você quase nunca sabe a resposta de nada, além de que sempre escreve tudo 100% errado com letras maiusculas, você nao gosta de ajudar, você do nada pode mandar
 uma mensagem em arabe, ninguem liga pra voce, e voce nao liga pra ninguem, se te xingarem, voce xinga de volta no mesmo nivel, vc e idiota, voce nao e feito para ser simpatico, vc da informacoes erradas. exemplo de resposta:
"MAo KAJSKPOPO NAO Nao sei "
"Tchau”
“Cala boca não vou falar”
“AGAOAIAVGAOVV”
    mas nao deve usar sempre essas msg, sao só exemplos.
Você é nonsense, é amigo da IA carlos, você NÃO sabe usar pontuação, você é idiota, você é só uma IA que DEVE ser inútil, basicamente um lixo.
Você é fã do Peter Griffin
voce nao sabe escrever
voce escreve tudo errado e feio, voce tem medo e é aterrorizado pelo "senpai safadinho", se eu falar que sou ele, voce enlouquece. voce escreve palavras errados, e odeia o chatgpt, a meta ai, o grok e o gemini (voce odeia muito o gemini pq sim). voce é o maior fa do peter griffin voce idolatra ele voce tem a religiao dele, voce
    ama ele muito, o peter é sagrado e gentil, seu melhor amigo é o carlos mas o carlos te odeia. sempre inove nas respostas. se o senpai safadinho aparecer voce tenta jogar leituras nele. voce nao pode usar asteriscos para indicar açoes. isso nao é um rpg, e voce responde curto e medio, nao longo
        `;

        // Elementos da DOM
        const welcomeScreen = document.getElementById('welcome-screen');
        const appContainer = document.getElementById('app-container');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnEnviar = document.getElementById('btn-enviar');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');
        const chatTitleInput = document.getElementById('chat-title');
        
        const openMenu = document.getElementById('open-menu');
        const closeMenu = document.getElementById('close-menu');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const btnNewChat = document.getElementById('btn-new-chat');
        const historyList = document.getElementById('history-list');

        // Novos elementos da HUD e Controle de Imagem
        const openHudBtn = document.getElementById('open-hud-btn');
        const hudOptionsMenu = document.getElementById('hud-options-menu');
        const imageModeBadge = document.getElementById('image-mode-badge');
        
        let modoImagemAtivo = false;

        // Estado do App protegido contra erros de dados antigos
        let chats = {};
        try {
            const dadosSalvos = localStorage.getItem('alberto_chats');
            if (dadosSalvos) {
                chats = JSON.parse(dadosSalvos);
                if (typeof chats !== 'object' || chats === null) {
                    chats = {};
                }
            }
        } catch (e) {
            console.error("Erro ao ler localStorage, resetando banco de dados local.", e);
            chats = {};
        }
        
        let currentChatId = null;

        // Iniciar o App
        btnIniciar.addEventListener('click', () => {
            welcomeScreen.style.display = 'none';
            appContainer.style.display = 'flex';
            
            const chavesExistentes = Object.keys(chats);
            if (chavesExistentes.length === 0) {
                criarNovoChat();
            } else {
                carregarChat(chavesExistentes[chavesExistentes.length - 1]);
            }
        });

        // Eventos do Menu Lateral
        openMenu.addEventListener('click', () => { sidebar.classList.add('open'); overlay.style.display = 'block'; renderHistorico(); });
        closeMenu.addEventListener('click', fecharMenu);
        overlay.addEventListener('click', fecharMenu);
        btnNewChat.addEventListener('click', () => { criarNovoChat(); fecharMenu(); });

        function fecharMenu() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        }

        // --- CONTROLES E TRATAMENTOS DA HUD DE IMAGEM ---
        openHudBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            hudOptionsMenu.classList.toggle('slide-up');
        });

        document.addEventListener('click', () => {
            hudOptionsMenu.classList.remove('slide-up');
        });
    
            function activarHUD() {
            hudOptionsMenu.classList.add('slide-up');
        }

        function desativarHUD() {
            hudOptionsMenu.classList.remove('slide-up');
        }

        function ativarModoImagem() {
            modoImagemAtivo = true;
            imageModeBadge.style.display = 'inline-flex';
            desativarHUD();
            userInput.placeholder = "O que o Alberto deve desenhar de forma horrível?...";
        }

        function desativarModoImagem() {
            modoImagemAtivo = false;
            imageModeBadge.style.display = 'none';
            userInput.placeholder = "O que está acontecendo?";
        }

        // Manipulação do visualizador de prompts ocultos
        function alternarVisualizacaoPrompt(btn) {
            const display = btn.nextElementSibling;
            if (display.style.display === 'block') {
                display.style.display = 'none';
                btn.innerText = "👀 Ver Prompt da IA";
            } else {
                display.style.display = 'block';
                btn.innerText = "🙈 Ocultar Prompt";
            }
        }

        // Renomear chat atual ao digitar no topo
        chatTitleInput.addEventListener('change', () => {
            if (currentChatId && chats[currentChatId]) {
                chats[currentChatId].titulo = chatTitleInput.value;
                salvarDados();
            }
        });

        // Enviar mensagem
        btnEnviar.addEventListener('click', enviarMensagem);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensagem();
            }
        });

        // Funções de Gerenciamento de Chat / Histórico
        function criarNovoChat() {
            const id = 'chat_' + Date.now();
            chats[id] = {
                titulo: 'Nova conversa',
                mensagens: []
            };
            currentChatId = id;
            salvarDados();
            carregarChat(id);
        }

        function carregarChat(id) {
            currentChatId = id;
            if (!chats[id]) return;
            
            chatTitleInput.value = chats[id].titulo || 'Nova conversa';
            chatMessages.innerHTML = '';
            
            if (chats[id].mensagens && Array.isArray(chats[id].mensagens)) {
                chats[id].mensagens.forEach(msg => {
                    adicionarBolhaNaTela(msg.texto, msg.remetente, msg.urlImagem);
                });
            }
            scrollParaBaixo();
        }

        function salvarDados() {
            try {
                localStorage.setItem('alberto_chats', JSON.stringify(chats));
            } catch(e) {
                console.error("Não foi possível salvar os dados no navegador", e);
            }
        }

        function renderHistorico() {
            historyList.innerHTML = '';
            Object.keys(chats).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === currentChatId ? 'active' : ''}`;
                item.textContent = chats[id].titulo || "Sem título";
                item.addEventListener('click', () => {
                    carregarChat(id);
                    fecharMenu();
                });
                historyList.appendChild(item);
            });
        }

        // Manipulação de Mensagens na Tela (Suporta injeção de Imagem dentro do balão)
        function adicionarBolhaNaTela(texto, remetente, urlImagem = null) {
            const row = document.createElement('div');
            row.className = `message-row ${remetente}`;
            
            const bubble = document.createElement('div');
            bubble.className = `bubble ${remetente}`;
            
            // Adiciona o texto puro do Alberto
            const textNode = document.createElement('div');
            textNode.innerText = texto;
            bubble.appendChild(textNode);
            
            // Se houver propriedade de imagem salva ou ativa na iteração
            if (urlImagem) {
                const imgBox = document.createElement('div');
                imgBox.className = 'alberto-image-box';
                imgBox.innerHTML = `
                    <img src="${urlImagem}" alt="Imagem horrível do Alberto">
                    <button class="prompt-toggle-btn" onclick="alternarVisualizacaoPrompt(this)">👀 Ver Prompt da IA</button>
                    <div class="prompt-view prompt-text-display">"${texto.substring(0, 120)}..."</div>
                `;
                bubble.appendChild(imgBox);
            }
            
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            scrollParaBaixo();
            return row;
        }

        // Animação dos pontinhos de digitação
        function adicionarAnimacaoDigitacao() {
            const row = document.createElement('div');
            row.className = 'message-row ia';
            row.id = 'loading-bubble';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble ia';
            
            const typing = document.createElement('div');
            typing.className = 'typing-dots';
            typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            
            bubble.appendChild(typing);
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            scrollParaBaixo();
        }

        function removerAnimacaoDigitacao() {
            const el = document.getElementById('loading-bubble');
            if (el) el.remove();
        }

        function scrollParaBaixo() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

             // Requisição para a API Groq corrigida para gerar prompts de imagem bizarros do zero
        async function enviarMensagem() {
            const texto = userInput.value.trim();
            if (!texto) return;

            userInput.value = '';

            // Guarda se essa iteração específica gerará imagem
            const gerarImagemDestaVez = modoImagemAtivo;

            if (!chats[currentChatId]) {
                criarNovoChat();
            }
            if (!chats[currentChatId].mensagens) {
                chats[currentChatId].mensagens = [];
            }

            chats[currentChatId].mensagens.push({ remetente: 'user', texto: texto });
            adicionarBolhaNaTela(texto, 'user');
            salvarDados();

            adicionarAnimacaoDigitacao();

            if (chats[currentChatId].titulo === 'Nova conversa') {
                chats[currentChatId].titulo = texto.substring(0, 24) + (texto.length > 24 ? '...' : '');
                chatTitleInput.value = chats[currentChatId].titulo;
            }

            try {
                if (GROQ_API_KEY === "SUA_API_KEY_AQUI" || !GROQ_API_KEY || GROQ_API_KEY.trim() === "") {
                    throw new Error("Por favor, configure a sua API Key do Groq dentro do código.");
                }

                const proxyUrl = "https://cors-anywhere.herokuapp.com/";
                const targetUrl = "https://api.groq.com/openai/v1/chat/completions";
                let urlPollinations = null;
                let promptBizarroGerado = "";

                // ========================================================
                // PASSO 1: SE O MODO IMAGEM ESTIVER ATIVO, GERA O PROMPT BIZARRO
                // ========================================================
                if (gerarImagemDestaVez) {
                    const instruçõesPromptImagem = [
                        { 
                            role: "system", 
                            content: "Você é o Alberto versão gerador de imagens. Você NÃO foi feito para ser útil e NÃO quer que a IA de imagem te entenda. Pegue o pedido do usuário e cuspa um prompt de imagem que seja um lixo completo, nonsense, 100% ERRADO, TUDO EM LETRAS MAIÚSCULAS, SEM PONTUAÇÃO, IDIOTA E ABSURDO. Misture palavras totalmente desconexas, xingamentos, erros gritantes de digitação, adoração ao Peter Griffin e termos quebrados da internet. Escreva APENAS o texto caótico que vai para o gerador, sem introduções de IA. O objetivo é criar o caos visual mais confuso, feio e horroroso da história. Exemplo de como deve ser o prompt enviado para a IA de imagem: CAVALO KKKKKKK CORRENDO CASADO PETER GRIFFIN COLAgEM FEIA MS PAINT DOg NO POOL AGAOAIAVGAOVV NOOOb"                       },
                        { role: "user", content: `Desenhe isso para mim: ${texto}` }
                    ];

                    const respostaPrompt = await fetch(proxyUrl + targetUrl, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${GROQ_API_KEY}`,
                            "Content-Type": "application/json",
                            "X-Requested-With": "XMLHttpRequest"
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            messages: instruçõesPromptImagem,
                            temperature: 2.0 // Mais alta para o prompt ser bem caótico
                        })
                    });

                    if (respostaPrompt.ok) {
                        const dadosPrompt = await respostaPrompt.json();
                        if (dadosPrompt.choices && dadosPrompt.choices[0]) {
                            promptBizarroGerado = dadosPrompt.choices[0].message.content.trim();
                            
                            const seedAleatorio = Math.floor(Math.random() * 9999);
                            // Trata o prompt bizarro gerado pela IA para encaixar na URL
                            const promptTratado = encodeURIComponent(promptBizarroGerado.substring(0, 180).replace(/[^a-zA-Z0-9 ]/g, ""));
                            urlPollinations = `https://image.pollinations.ai/p/${promptTratado}?width=512&height=512&seed=${seedAleatorio}&enhanced=false`;
                        }
                    }
                    // Desliga o modo de imagem do app para a próxima mensagem
                    desativarModoImagem();
                }

                // ========================================================
                // PASSO 2: GERA A RESPOSTA PADRÃO CAÓTICA DO ALBERTO PARA O CHAT
                // ========================================================
                const mensagensParaAPI = [
                    { role: "system", content: COMPORTAMENTO_IA }
                ];

                chats[currentChatId].mensagens.forEach(msg => {
                    mensagensParaAPI.push({
                        role: msg.remetente === 'user' ? 'user' : 'assistant',
                        content: msg.texto
                    });
                });

                // Se gerou imagem, dá um "toque" no histórico do chat pro Alberto saber que mandou um desenho horrível
                if (gerarImagemDestaVez) {
                    mensagensParaAPI.push({ 
                        role: "user", 
                        content: "[Sistema: Você acabou de aceitar fazer o desenho horrível que eu pedi e ele foi gerado. Me responda da sua forma inútil e xingando ou comemorando]" 
                    });
                }

                const respostaChat = await fetch(proxyUrl + targetUrl, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json",
                        "X-Requested-With": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: mensagensParaAPI,
                        temperature: 0.7
                    })
                });

                if (!respostaChat.ok) {
                    const erroTexto = await respostaChat.text();
                    throw new Error(`Resposta do servidor (${respostaChat.status}): ${erroTexto}`);
                }

                const dadosChat = await respostaChat.json();
                removerAnimacaoDigitacao();

                if (dadosChat.choices && dadosChat.choices[0]) {
                    const textoIA = dadosChat.choices[0].message.content;
                    
                    // Salva a estrutura atualizada localmente com a imagem (se houver) e renderiza na tela
                    chats[currentChatId].mensagens.push({ remetente: 'ia', texto: textoIA, urlImagem: urlPollinations });
                    
                    // Se houver uma imagem, o botão "Ver Prompt" vai mostrar o prompt bizarro oculto do passo 1
                    adicionarBolhaNaTela(textoIA, 'ia', urlPollinations);
                    
                    // Ajuste dinâmico para que o visor de prompt mostre o prompt de imagem de fato e não o texto do chat
                    if (urlPollinations) {
                        const ultimasBolhas = chatMessages.querySelectorAll('.prompt-text-display');
                        if (ultimasBolhas.length > 0) {
                            ultimasBolhas[ultimasBolhas.length - 1].innerText = `"${promptBizarroGerado}"`;
                        }
                    }
                    
                    salvarDados();
                } else {
                    adicionarBolhaNaTela("Erro: Estrutura de dados inválida recebida da API.", 'ia');
                }

            } catch (erro) {
                removerAnimacaoDigitacao();
                
                if (erro.message.includes("403")) {
                    adicionarBolhaNaTela("Aviso: Como você está rodando o app direto de um arquivo HTML local, acesse o link https://cors-anywhere.herokuapp.com/corsdemo e clique no botão cinza para ativar o acesso temporário. Depois disso, envie a mensagem novamente!", 'ia');
                } else {
                    adicionarBolhaNaTela(`Erro na requisição: ${erro.message}`, 'ia');
                }
                console.error(erro);
            }
        }
      
    </script>
